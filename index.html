<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Quà 8/3 cho Mẹ</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Poppins&display=swap" rel="stylesheet">

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:linear-gradient(135deg,#ff9ec6,#ffd6e7);
font-family:Poppins;
overflow:hidden;
}

h1{
position:absolute;
top:40px;
color:white;
font-family:Dancing Script;
font-size:32px;
text-align:center;
}

/* hộp quà */

.gift-box{
width:150px;
height:150px;
background:#ff4d88;
position:relative;
cursor:pointer;
transform-style:preserve-3d;
transition:1s;
border-radius:10px;
}

.lid{
width:150px;
height:40px;
background:#ff1f6b;
position:absolute;
top:-40px;
border-radius:10px;
transition:1s;
}

.ribbon-v{
width:30px;
height:150px;
background:white;
position:absolute;
left:60px;
}

.ribbon-h{
width:150px;
height:30px;
background:white;
position:absolute;
top:60px;
}

.open .lid{
transform:translateY(-120px) rotate(20deg);
}

/* thư */

.letter{
position:absolute;
width:320px;
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
text-align:center;
opacity:0;
transform:scale(0);
transition:1s;
}

.letter.show{
opacity:1;
transform:scale(1);
}

.letter img{
width:80%;
border-radius:15px;
margin-bottom:10px;
}

/* hoa */

.rose{
position:absolute;
bottom:120px;
font-size:40px;
opacity:0;
transform:scale(0);
transition:1s;
}

.rose.show{
opacity:1;
transform:scale(1.5);
}

/* tim bay */

.heart{
position:absolute;
color:#ff2d75;
font-size:20px;
animation:float 6s linear infinite;
}

@keyframes float{
0%{
transform:translateY(0) scale(1);
opacity:1;
}
100%{
transform:translateY(-800px) scale(1.5);
opacity:0;
}
}

/* sparkle */

.sparkle{
position:absolute;
color:white;
font-size:14px;
animation:spark 3s infinite;
}

@keyframes spark{
0%{opacity:0}
50%{opacity:1}
100%{opacity:0}
}

</style>
</head>

<body>

<h1>Nhấn vào hộp quà nhé mẹ ❤️</h1>

<div class="gift-box" onclick="openGift()" id="gift">

<div class="lid"></div>
<div class="ribbon-v"></div>
<div class="ribbon-h"></div>

</div>

<div class="rose" id="rose">🌹</div>

<div class="letter" id="letter">

<img src="me.jpg">

<p style="font-family:Dancing Script;font-size:26px">

Mẹ yêu ❤️

</p>

<p>
Ngày 8/3,
Chúc mẹ luôn khỏe mạnh,  
luôn vui vẻ và hạnh phúc.
Cảm ơn mẹ vì đã luôn yêu thương,  
chăm sóc và hy sinh cho con.
Con yêu mẹ rất nhiều 💗

</p>

</div>

<audio id="music" preload="auto">
  <source src="music.mp3" type="audio/mpeg">
</audio>
<script>

function openGift(){

let gift=document.getElementById("gift")
let rose=document.getElementById("rose")
let letter=document.getElementById("letter")
let music=document.getElementById("music")

gift.classList.add("open")

music.currentTime = 0
music.play().catch(()=>{})

setTimeout(()=>{
rose.classList.add("show")
},800)

setTimeout(()=>{
letter.classList.add("show")
},1600)

hearts()
sparkles()

}
function hearts(){

setInterval(()=>{

let heart=document.createElement("div")

heart.className="heart"
heart.innerHTML="💗"

heart.style.left=Math.random()*100+"vw"
heart.style.top="100vh"

document.body.appendChild(heart)

setTimeout(()=>{
heart.remove()
},6000)

},300)

}

function sparkles(){

setInterval(()=>{

let s=document.createElement("div")

s.className="sparkle"
s.innerHTML="✨"

s.style.left=Math.random()*100+"vw"
s.style.top=Math.random()*100+"vh"

document.body.appendChild(s)

setTimeout(()=>{
s.remove()
},3000)

},200)

}

</script>

</body>
</html>
